version: '3.8'

services:
  # ==================== BOT ====================
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: split_bill_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - TZ=Europe/Moscow  # 🆕 Часовой пояс для планировщика
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - bot_network
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== NEO4J ====================
  neo4j:
    image: neo4j:5.15
    container_name: split_bill_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (веб-интерфейс)
      - "7687:7687"   # Bolt (соединение с ботом)
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bot_network

# ==================== VOLUMES ====================
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local

# ==================== NETWORKS ====================
networks:
  bot_network:
    driver: bridge